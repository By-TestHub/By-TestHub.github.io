<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BY-TESTHUB | SYSTEM ACCESS</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding: 40px; }
        .box { border: 1px solid #00ff00; padding: 40px; border-radius: 10px; display: inline-block; background: #000; box-shadow: 0 0 20px #00ff00; min-width: 300px; }
        .key-box { background: #111; padding: 20px; border-radius: 5px; margin: 20px 0; font-size: 35px; font-weight: bold; color: #fff; border: 1px solid #333; text-shadow: 0 0 10px #00ff00; }
        .timer-box { color: #ff4444; font-size: 18px; margin-top: 10px; font-weight: bold; }
        .status { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="font-size: 18px;">ACCESS KEY GENERATOR</h1>
        <p class="status">Automatic Reset Every 12 Hours</p>
        
        <div id="displayKey" class="key-box">LOADING...</div>
        
        <div class="timer-box">
            คีย์นี้จะหมดอายุในอีก: <span id="countdown">--:--:--</span>
        </div>
        
        <p style="color: #444; font-size: 12px; margin-top: 20px;">* เมื่อหมดเวลา คีย์จะเปลี่ยนใหม่ทันที *</p>
    </div>

    <script>
        function updateSystem() {
            const now = new Date();
            const hours = now.getHours();
            
            // 1. สร้างคีย์ (เหมือนเดิม)
            const timeSlot = hours < 12 ? 0 : 1;
            const seed = now.getFullYear().toString() + now.getMonth() + now.getDate() + timeSlot;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let key = "";
            let s = parseInt(seed);
            for (let i = 0; i < 8; i++) {
                s += i;
                let r = Math.abs(Math.sin(s) * 10000) % 1;
                key += chars.charAt(Math.floor(r * chars.length));
            }
            document.getElementById('displayKey').innerText = key;

            // 2. ระบบนับถอยหลัง (Countdown)
            const nextUpdate = new Date();
            if (hours < 12) {
                nextUpdate.setHours(12, 0, 0, 0); // เป้าหมายคือเที่ยงวัน
            } else {
                nextUpdate.setHours(24, 0, 0, 0); // เป้าหมายคือเที่ยงคืน
            }

            function tick() {
                const currentTime = new Date();
                const diff = nextUpdate - currentTime;
                
                if (diff <= 0) {
                    location.reload(); // เมื่อหมดเวลา ให้รีเฟรชหน้าเพื่อเอาคีย์ใหม่
                    return;
                }

                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                
                document.getElementById('countdown').innerText = 
                    String(h).padStart(2, '0') + ":" + 
                    String(m).padStart(2, '0') + ":" + 
                    String(s).padStart(2, '0');
            }
            
            setInterval(tick, 1000);
            tick();
        }

        updateSystem();
    </script>
</body>
</html>
