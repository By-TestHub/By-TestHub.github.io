<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BY-TESTHUB KEY</title>
    <style>
        /* 🎨 สไตล์หลักจาก UI อันที่สอง */
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .main-card { background-color: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        .success-icon { border: 2px solid #4caf50; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; width: 60px; height: 60px; margin-bottom: 25px; }
        .success-icon span { font-size: 30px; color: #4caf50; }
        .title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #b0b0b0; margin-bottom: 25px; }
        .key-input-container { background-color: #0d0d0d; border: 1px solid #333; border-radius: 12px; padding: 18px; font-size: 20px; font-family: monospace; color: #ffffff; text-align: center; margin-bottom: 15px; }
        .btn-copy { background-color: #ffffff; color: #000; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 20px; transition: 0.2s; }
        .btn-copy:hover { background-color: #e0e0e0; }
        .buy-section { border-top: 1px solid #333; padding-top: 20px; }
        .btn-go-shop { background-color: #ffd700; color: #000; text-decoration: none; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: bold; display: block; transition: 0.3s; }
        .btn-go-shop:hover { transform: scale(1.02); }

        /* 🖼️ สไตล์หน้าต่างเด้ง (Popup Overlay) */
        #popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; }
        .popup-card { background: #ffffff; color: #333; padding: 35px; border-radius: 20px; width: 280px; text-align: center; animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .popup-icon-box { width: 55px; height: 55px; border: 3px solid #4caf50; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .popup-icon-box span { color: #4caf50; font-size: 32px; font-weight: bold; }
        .popup-card h2 { margin: 0 0 25px 0; font-size: 20px; color: #333; font-weight: bold; }
        .btn-ok { background: #6200ee; color: #fff; border: none; padding: 12px 50px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-ok:hover { background: #4b00d1; }
        
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="success-icon"><span>&#10003;</span></div>
        <div class="title">Get Free Key!</div>
        <div class="subtitle">เหลือเวลาอีก <span id="h"></span> ชม. <span id="m"></span> นาที</div>
        
        <div class="key-input-container" id="key-display">LOADING...</div>
        
        <button class="btn-copy" onclick="showPopup()">คัดลอกคีย์</button>
        
            <a href="https://by-testhub.github.io/GGHUB/" class="btn-go-shop">ซื้อคีย์ถาวร</a>
        </div>
    </div>

    <div id="popup-overlay">
        <div class="popup-card">
            <div class="popup-icon-box"><span>&#10003;</span></div>
            <h2>คัดลอกคีย์สำเร็จ!</h2>
            <button class="btn-ok" onclick="actionCopy()">OK</button>
        </div>
    </div>

    <script>
        // [[ ระบบสุ่มคีย์และนับเวลา ]]
        function updateKey() {
            const now = new Date();
            const h = now.getHours();
            const slot = h < 12 ? 0 : 1;
            const seed = now.getFullYear().toString() + now.getMonth() + now.getDate() + slot;
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let key = "TESTHUB";
            let s = parseInt(seed);
            for (let i = 0; i < 8; i++) {
                s += i;
                let r = Math.abs(Math.sin(s) * 10000) % 1;
                key += chars.charAt(Math.floor(r * chars.length));
            }
            document.getElementById('key-display').innerText = key;

            const next = new Date();
            h < 12 ? next.setHours(12,0,0,0) : next.setHours(24,0,0,0);
            function tick() {
                const diff = next - new Date();
                if (diff <= 0) { location.reload(); return; }
                document.getElementById('h').innerText = Math.floor(diff / 3600000);
                document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            }
            setInterval(tick, 1000); tick();
        }

        // ฟังก์ชันแสดง Popup
        function showPopup() {
            document.getElementById('popup-overlay').style.display = 'flex';
        }

        // ฟังก์ชันเมื่อกด OK: คัดลอกแล้วรีเฟรช
        function actionCopy() {
            const keyText = document.getElementById('key-display').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                location.reload(); // รีเฟรชหน้ากลับมาที่เดิม
            });
        }

        updateKey();
    </script>
</body>
</html>
