<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTHUB | GET KEY</title>
    <style>
        /* ดีไซน์โทนดำ-เทา-ฟ้า แบบพรีเมียม */
        body { 
            background-color: #0f0f13; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .main-card { 
            background-color: #16161e; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            text-align: center; 
            width: 90%; 
            max-width: 420px; 
            border: 1px solid #2b2b37; 
        }

        .success-icon { 
            background-color: rgba(76, 175, 80, 0.1);
            border: 2px solid #4caf50; 
            border-radius: 50%; 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            width: 70px; 
            height: 70px; 
            margin-bottom: 25px; 
        }

        .success-icon span { font-size: 35px; color: #4caf50; }

        .title { font-size: 26px; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }

        .subtitle { font-size: 14px; color: #8b8b9e; margin-bottom: 30px; }

        .key-input-container { 
            background-color: #09090c; 
            border: 1px solid #333345; 
            border-radius: 14px; 
            padding: 22px; 
            font-size: 22px; 
            font-family: 'Courier New', Courier, monospace; 
            color: #00d2ff; 
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
            text-align: center; 
            margin-bottom: 20px; 
            font-weight: bold;
            letter-spacing: 2px;
        }

        .btn-copy { 
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%); 
            color: #000; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 25px; 
            transition: 0.3s; 
        }

        .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        .btn-go-shop { 
            background-color: rgba(255, 215, 0, 0.1); 
            color: #ffd700; 
            text-decoration: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-size: 14px; 
            font-weight: bold; 
            display: block; 
            border: 1px solid #ffd700;
            transition: 0.3s; 
        }

        .btn-go-shop:hover { background-color: #ffd700; color: #000; }

        /* Popup Setup */
        #popup-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
        }

        .popup-card { 
            background: #ffffff; 
            color: #1a1a1a; 
            padding: 35px; 
            border-radius: 24px; 
            width: 300px; 
            text-align: center; 
            animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        .btn-ok { 
            background: #007bff; 
            color: #fff; 
            border: none; 
            padding: 12px 60px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
        }

        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="success-icon"><span>&#10003;</span></div>
        <div class="title">รับคีย์ฟรีสำเร็จ!</div>
        <div class="subtitle">คีย์นี้เหลือเวลาอีก <span id="h">--</span> ชม. <span id="m">--</span> นาที</div>
        
        <div class="key-input-container" id="key-display">GENERATING...</div>
        
        <button class="btn-copy" onclick="copyToClipboard()">คัดลอกคีย์</button>
        
        <div class="buy-section">
            <a href="https://by-testhub.github.io/KeyTESTHUB/" class="btn-go-shop">ซื้อคีย์ถาวร (ปลดล็อคฟังก์ชันที่ล็อคไว้)</a>
        </div>
    </div>

    <div id="popup-overlay">
        <div class="popup-card">
            <div style="font-size: 50px; color: #4caf50; margin-bottom: 10px;">✔</div>
            <h2 style="margin-bottom: 20px;">คัดลอกคีย์สำเร็จ!</h2>
            <button class="btn-ok" onclick="closePopup()">ตกลง</button>
        </div>
    </div>

    <script>
        function updateKey() {
            const now = new Date();
            const h = now.getHours();
            
            const slot = h < 12 ? 0 : 1;
        
            const seed = now.getFullYear().toString() + now.getMonth() + now.getDate() + slot;
            
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let key = "TESTHUB-";
            let s = parseInt(seed);
            
            for (let i = 0; i < 8; i++) {
                let currentS = s + i;
                let r = Math.abs(Math.sin(currentS) * 10000) % 1;
                key += chars.charAt(Math.floor(r * chars.length));
            }
            
            document.getElementById('key-display').innerText = key;

            const nextUpdate = new Date();
            if (h < 12) {
                nextUpdate.setHours(12, 0, 0, 0);
            } else {
                nextUpdate.setHours(24, 0, 0, 0);
            }

            function tick() {
                const diff = nextUpdate - new Date();
                if (diff <= 0) {
                    window.location.reload();
                    return;
                }
                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                document.getElementById('h').innerText = hours;
                document.getElementById('m').innerText = minutes;
            }
            
            setInterval(tick, 1000);
            tick();
        }

        function copyToClipboard() {
            const keyText = document.getElementById('key-display').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                document.getElementById('popup-overlay').style.display = 'flex';
            });
        }

        function closePopup() {
            document.getElementById('popup-overlay').style.display = 'none';
        }

        // เริ่มทำงาน
        updateKey();
    </script>
</body>
</html>
